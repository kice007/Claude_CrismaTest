<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 243 150" width="243" height="150">
  <defs>
    <radialGradient id="shieldBg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </radialGradient>
    <linearGradient id="shieldFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#1B2559"/>
    </linearGradient>
  </defs>
  <rect width="243" height="150" fill="url(#shieldBg)"/>
  <!-- Outer pulse rings -->
  <circle cx="121" cy="72" r="62" fill="none" stroke="#C7D2FE" stroke-width="1" opacity="0.6"/>
  <circle cx="121" cy="72" r="50" fill="none" stroke="#C7D2FE" stroke-width="1" opacity="0.4"/>
  <!-- Decorative dots around ring -->
  <circle cx="59" cy="72" r="3" fill="#A5B4FC" opacity="0.6"/>
  <circle cx="183" cy="72" r="3" fill="#A5B4FC" opacity="0.6"/>
  <circle cx="121" cy="10" r="3" fill="#A5B4FC" opacity="0.6"/>
  <circle cx="84" cy="20" r="2.5" fill="#C7D2FE" opacity="0.8"/>
  <circle cx="158" cy="20" r="2.5" fill="#C7D2FE" opacity="0.8"/>
  <!-- Shield background glow -->
  <ellipse cx="121" cy="80" rx="44" ry="36" fill="#C7D2FE" opacity="0.3"/>
  <!-- Main shield -->
  <path d="M121,18 L155,32 V68 a34,34 0,0,1 -34,32 a34,34 0,0,1 -34,-32 V32 Z" fill="url(#shieldFill)"/>
  <!-- Shield inner highlight -->
  <path d="M121,26 L147,38 V65 a26,26 0,0,1 -26,24 a26,26 0,0,1 -26,-24 V38 Z" fill="#FFFFFF" opacity="0.08"/>
  <!-- Checkmark -->
  <path d="M107,66 l10,10 l20,-22" stroke="#FFFFFF" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Verified badge corner -->
  <circle cx="155" cy="32" r="10" fill="#4F46E5" stroke="#EEF2FF" stroke-width="2"/>
  <path d="M151,32 l2.5,2.5 l5,-5" stroke="#FFFFFF" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
